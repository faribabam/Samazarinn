<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samazarinn | Luxury Jewelry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #81D8D0; /* Tiffany Blue */
            --card-bg: #FFFFFF;   /* Pure White */
            --accent: #FFFDD0;    /* Cream White */
            --text: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            transition: all 0.3s;
        }

        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        
        .main-container {
            display: flex;
            flex-wrap: wrap;
            padding: 5%;
            gap: 20px;
            align-items: center;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            flex: 1;
            min-width: 300px;
            border: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #canvas-box { flex: 1; height: 400px; background: var(--card-bg); border-radius: 20px; }

        /* Admin Panel */
        #admin-panel {
            position: fixed; top: 0; left: -400px; width: 350px; height: 100vh;
            background: var(--card-bg); padding: 20px; z-index: 999;
            transition: 0.4s; border-right: 2px solid var(--accent); overflow-y: auto;
        }
        #admin-panel.open { left: 0; }
        
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
        .toggle-btn { position: fixed; bottom: 20px; left: 20px; cursor: pointer; background: var(--accent); border: none; padding: 10px; border-radius: 50%; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1 id="brand-title">Samazarinn</h1>
    <button onclick="toggleLang()" style="cursor:pointer">EN / FA</button>
</header>

<div class="main-container">
    <div class="card">
        <h2 id="title">Luxury Jewelry</h2>
        <p id="desc">Exquisite designs for the modern elite.</p>
        <button id="cta">Shop Now</button>
    </div>
    <div id="canvas-box"></div>
</div>

<footer id="footer-text">Made by fari_codewriter</footer>

<button class="toggle-btn" onclick="document.getElementById('admin-panel').classList.toggle('open')">⚙️</button>

<div id="admin-panel">
    <h3>Admin Panel</h3>
    <label>Title (FA/EN)</label>
    <input id="in-title" placeholder="Title">
    <textarea id="in-desc" placeholder="Description"></textarea>
    <button onclick="saveChanges()" style="background:var(--bg-color)">Save & Apply</button>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('samazarinn_data')) || {
        title: "Samazarinn Jewelry",
        desc: "Premium quality crafted with passion.",
        lang: 'en'
    };

    function updateUI() {
        document.getElementById('title').innerText = state.title;
        document.getElementById('desc').innerText = state.desc;
    }

    function saveChanges() {
        state.title = document.getElementById('in-title').value;
        state.desc = document.getElementById('in-desc').value;
        localStorage.setItem('samazarinn_data', JSON.stringify(state));
        updateUI();
    }

    function toggleLang() {
        state.lang = state.lang === 'en' ? 'fa' : 'en';
        document.body.dir = state.lang === 'fa' ? 'rtl' : 'ltr';
        updateUI();
    }

    // Three.js Setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({alpha: true});
    renderer.setSize(400, 400);
    document.getElementById('canvas-box').appendChild(renderer.domElement);
    
    const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
    const material = new THREE.MeshStandardMaterial({ color: 0xFFFDD0 });
    const knot = new THREE.Mesh(geometry, material);
    scene.add(knot);
    scene.add(new THREE.AmbientLight(0xffffff, 1));
    
    camera.position.z = 5;
    function animate() {
        requestAnimationFrame(animate);
        knot.rotation.x += 0.01;
        knot.rotation.y += 0.01;
        renderer.render(scene, camera);
    }
    animate();

    updateUI();
</script>
</body>
</html>
